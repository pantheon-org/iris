version: 2

before:
  hooks:
    - go mod tidy

builds:
  - binary: iris
    main: ./cmd/iris
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/pantheon-org/iris/internal/version.Version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

homebrew_casks:
  - name: iris
    skip_upload: '{{ if not .Env.HOMEBREW_TAP_GITHUB_TOKEN }}true{{ end }}'
    repository:
      owner: pantheon-org
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/pantheon-org/iris"
    description: "Manage MCP server configs across AI providers"
    license: "MIT"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
