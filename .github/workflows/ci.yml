name: CI

on:
  pull_request:
  push:
    branches:
      - "release-please--branches--*"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: gofmt
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "Files not formatted:"; echo "$files"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

      - uses: jdx/mise-action@v2

      - name: actionlint
        run: actionlint

      - name: mdlint
        run: mdlint check .

  test:
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: go test
        run: go test -race ./...

  build:
    runs-on: ubuntu-latest
    needs: [test, changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: go build
        run: go build ./...
