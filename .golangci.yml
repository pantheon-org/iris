version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - exhaustive
    - wrapcheck
    - misspell
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf
    exhaustive:
      default-signifies-exhaustive: true

formatters:
  enable:
    - gofmt
