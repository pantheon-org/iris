[settings]
minimum_release_age = "7d"

[tools]
"github:DeusData/codebase-memory-mcp" = "latest"
"github:rtk-ai/rtk" = "latest"
"github:swanysimon/mdlint" = "latest"
"npm:@tobilu/qmd" = "latest"
"pipx:code-review-graph" = "latest"
actionlint = "latest"
go = "1.24.3"
golangci-lint = "2.11.4"
goreleaser = "latest"
lefthook = "2.1.5"
shellcheck = "latest"

[tasks]
[tasks.build]
run = "go build -o dist/iris ./cmd/iris"

[tasks.test]
run = "go test -race ./..."

[tasks.lint]
run = "golangci-lint run ./..."

[tasks."ai:setup"]
run = """
    rtk init -g --gemini;
    rtk init --codex;
    rtk init -g --opencode;
    qmd skill install --yes --force;
    codebase-memory-mcp install;
    code-review-graph install
"""
